<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        try {
          localStorage.removeItem('wagwan_theme');
        } catch (e) {
          /* ignore */
        }
        document.documentElement.dataset.theme = 'light';
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f2ef" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.png" />

    <!-- PP Mori font -->
    <style>
      @font-face {
        font-family: 'PP Mori';
        src: url('/fonts/PPMori-Regular.otf') format('opentype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'PP Mori';
        src: url('/fonts/PPMori-SemiBold.otf') format('opentype');
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'PP Mori';
        src: url('/fonts/PPMori-Extralight.otf') format('opentype');
        font-weight: 200;
        font-style: normal;
        font-display: swap;
      }
    </style>

    <!-- OG / Social -->
    <meta property="og:title" content="WagwanAI — Find creators whose audiences look like your buyers" />
    <meta property="og:description" content="AI-powered creator marketplace. Describe your audience, get matched to micro-creators with real signal depth." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wagwanworld.vercel.app" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="WagwanAI" />
    <meta name="description" content="AI-powered creator marketplace. Find micro-creators whose audiences actually look like your buyers." />

    <title>WagwanAI</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="viewport" style="background:var(--bg-primary,#f4f2ef)">
    <div style="display:contents">%sveltekit.body%</div>
  </body>
</html>
