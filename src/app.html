<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        try {
          localStorage.removeItem('wagwan_theme');
        } catch (e) {
          /* ignore */
        }
        document.documentElement.dataset.theme = 'light';
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f2ef" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <!-- Inter font self-hosted via @fontsource/inter -->
    <title>Wagwan AI</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="viewport" style="background:var(--bg-primary,#f4f2ef)">
    <div style="display:contents">%sveltekit.body%</div>
  </body>
</html>
